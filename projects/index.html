<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Projects — Bluefire Games</title>
    <link href="/style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <h1>Projects</h1>
        <p>This page will eventually list game projects, prototypes, and showcases.</p>

        <p>For now, this is just a placeholder. Once I integrate Notion, this page will auto‑populate from my Projects database.</p>
		
		<p>
		Project List From Notion: 
			
		</p>
		
		<ul id="project-list"></ul>

		<script>
		fetch("https://bluefire-notion.jfedders6.workers.dev/")
		  .then(r => r.json())
		  .then(projects => {
			const list = document.getElementById("project-list");
			projects.forEach(name => {
			  const li = document.createElement("li");
			  li.textContent = name;
			  list.appendChild(li);
			});
		  });
		</script>

		
    </main>

    <script>
        fetch("/nav.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("nav-placeholder").innerHTML = data;
            });
    </script>
</body>
</html>
